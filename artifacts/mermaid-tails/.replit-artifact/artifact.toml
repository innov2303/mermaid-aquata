kind = "web"
previewPath = "/"
title = "Queue de Sirène - Site Artistique"
version = "1.0.0"
id = "artifacts/mermaid-tails"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19016

[services.development]
run = "pnpm --filter @workspace/mermaid-tails run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mermaid-tails", "run", "build" ]
publicDir = "artifacts/mermaid-tails/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19016"
BASE_PATH = "/"
